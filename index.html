<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electrician Nogueira - Professional Electrical Services in Danbury, CT</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary: #00B4D8;
  --primary-dark: #0096B7;
  --secondary: #1B1B2F;
  --secondary-light: #2E2E4A;
  --accent: #90E0EF;
  --text-dark: #12121E;
  --text-mid: #4A4A6A;
  --text-light: #7A7A9A;
  --bg-light: #F0F4F8;
  --bg-white: #FFFFFF;
  --border: #D8E4EE;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --shadow-lg: 0 8px 48px rgba(0,0,0,0.16);
  --radius: 12px;
  --radius-lg: 20px;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', sans-serif;
  color: var(--text-dark);
  background: var(--bg-white);
  overflow-x: hidden;
  line-height: 1.6;
}

img {
  max-width: 100%;
  display: block;
}

a {
  text-decoration: none;
  color: inherit;
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: rgba(27, 27, 47, 0.97);
  backdrop-filter: blur(10px);
  padding: 0 clamp(16px, 4vw, 40px);
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: 'Montserrat', sans-serif;
  font-weight: 800;
  font-size: clamp(16px, 3vw, 22px);
  color: #fff;
  white-space: nowrap;
}

.nav-brand span {
  color: var(--primary);
}

.nav-logo-icon {
  width: 38px;
  height: 38px;
  background: var(--primary);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: clamp(16px, 3vw, 32px);
  list-style: none;
}

.nav-links a {
  color: rgba(255,255,255,0.85);
  font-size: 14px;
  font-weight: 500;
  transition: color 0.2s;
  white-space: nowrap;
}

.nav-links a:hover {
  color: var(--primary);
}

.nav-cta {
  background: var(--primary);
  color: #fff !important;
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 700 !important;
  transition: background 0.2s, transform 0.2s !important;
}

.nav-cta:hover {
  background: var(--primary-dark) !important;
  transform: translateY(-1px);
}

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
  background: none;
  border: none;
  outline: none;
}

.hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: #fff;
  border-radius: 2px;
  transition: all 0.3s;
}

.mobile-menu {
  display: none;
  position: fixed;
  top: 70px;
  left: 0;
  right: 0;
  background: var(--secondary);
  z-index: 999;
  padding: 20px;
  flex-direction: column;
  gap: 0;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.mobile-menu.open {
  display: flex;
}

.mobile-menu a {
  color: rgba(255,255,255,0.9);
  font-size: 16px;
  font-weight: 500;
  padding: 14px 0;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  display: block;
}

.mobile-menu a:last-child {
  border-bottom: none;
  margin-top: 10px;
  background: var(--primary);
  color: #fff;
  text-align: center;
  border-radius: 8px;
  padding: 14px;
}

/* ===== HERO ===== */
.hero {
  min-height: 100vh;
  background: linear-gradient(135deg, #0D0D1A 0%, #1B1B2F 50%, #0D0D1A 100%);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: clamp(100px, 15vw, 140px) clamp(16px, 5vw, 60px) clamp(60px, 10vw, 100px);
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 70% 30%, rgba(0,180,216,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 10% 80%, rgba(0,180,216,0.10) 0%, transparent 50%);
  pointer-events: none;
}

.hero-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(30px, 5vw, 60px);
  max-width: 1200px;
  width: 100%;
  align-items: center;
  position: relative;
  z-index: 1;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,180,216,0.15);
  border: 1px solid rgba(0,180,216,0.4);
  color: var(--accent);
  padding: 8px 16px;
  border-radius: 50px;
  font-size: clamp(12px, 2vw, 14px);
  font-weight: 600;
  margin-bottom: 20px;
  width: fit-content;
}

.hero h1 {
  font-family: 'Montserrat', sans-serif;
  font-size: clamp(30px, 5.5vw, 62px);
  font-weight: 900;
  color: #fff;
  line-height: 1.1;
  margin-bottom: 20px;
}

.hero h1 em {
  font-style: normal;
  color: var(--primary);
}

.hero-desc {
  font-size: clamp(14px, 2vw, 18px);
  color: rgba(255,255,255,0.75);
  margin-bottom: 32px;
  max-width: 520px;
  line-height: 1.7;
}
